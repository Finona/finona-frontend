version: '3.8'

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finona-frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - nginx_logs:/var/log/nginx
    environment:
      - NODE_ENV=production
    networks:
      - frontend-network

volumes:
  nginx_logs:

networks:
  frontend-network:
    driver: bridge
